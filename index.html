<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition LLM | arXiv-Style Research Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f9f9f9; }
        .arxiv-header { border-bottom: 2px solid #b31b1b; }
        .sidebar { background: #f0f0f0; border-right: 1px solid #ddd; }
        #pdfViewerContainer { display: flex; flex-direction: column; align-items: center; background: #525659; padding: 20px; gap: 20px; overflow-y: auto; }
        canvas { box-shadow: 0 4px 8px rgba(0,0,0,0.5); background-color: white; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="arxiv-header bg-white p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-[#b31b1b]">Nutrition LLM</h1>
        <div class="flex items-center gap-4">
            <input id="apiKey" type="password" placeholder="Enter Gemini API Key" class="border p-2 rounded text-sm w-64">
            <div id="statusIndicator" class="w-4 h-4 rounded-full bg-gray-400"></div>
            <button onclick="connectAPI()" class="bg-[#b31b1b] text-white px-4 py-2 rounded text-sm hover:bg-red-800">Connect</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="sidebar w-1/4 flex flex-col p-4 overflow-y-auto">
            <h2 class="font-bold mb-4">Chat Assistant</h2>
            <div id="chatLog" class="flex-1 bg-white border p-4 mb-4 overflow-y-auto rounded shadow-inner text-sm"></div>
            <textarea id="userInput" class="w-full border p-2 rounded" placeholder="Ask about the document..."></textarea>
            <button onclick="sendMessage()" class="mt-2 bg-[#b31b1b] text-white p-2 rounded w-full">Send</button>
        </aside>

        <section class="flex-1 flex flex-col overflow-hidden">
            <div class="p-4 flex gap-2 border-b">
                <button onclick="generateDynamicContent('mindmap')" class="bg-gray-200 px-4 py-2 rounded text-sm hover:bg-gray-300">Generate Mindmap</button>
                <button onclick="generateDynamicContent('presentation')" class="bg-gray-200 px-4 py-2 rounded text-sm hover:bg-gray-300">Create Presentation</button>
            </div>
            <div id="pdfViewerContainer" class="flex-1 overflow-auto">
                <p id="placeholderText" class="text-gray-500 m-auto">Upload a research paper to view.</p>
            </div>
        </section>

        <aside class="sidebar w-1/4 p-4 overflow-y-auto">
            <h2 class="font-bold mb-4">Research Papers</h2>
            <input type="file" id="pdfUpload" accept=".pdf" class="mb-4">
            <ul id="docList" class="space-y-2"></ul>
        </aside>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let storedApiKey = "";
        let currentDocText = "";

        function connectAPI() {
            const keyInput = document.getElementById('apiKey').value.trim();
            if (keyInput.length < 10) {
                alert("API key invalid. Please provide a valid Gemini API key.");
                document.getElementById('statusIndicator').className = "w-4 h-4 rounded-full bg-red-500";
                return;
            }
            storedApiKey = keyInput;
            document.getElementById('statusIndicator').className = "w-4 h-4 rounded-full bg-green-500";
            alert("API Key connected!");
        }

        async function renderPDF(file) {
            const container = document.getElementById('pdfViewerContainer');
            container.innerHTML = 'Loading document...';
            currentDocText = "";
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({ data: this.result }).promise;
                container.innerHTML = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    currentDocText += textContent.items.map(item => item.str).join(" ");
                    
                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    container.appendChild(canvas);
                    await page.render({ canvasContext: context, viewport: viewport }).promise;
                }
            };
            reader.readAsArrayBuffer(file);
        }

        async function generateDynamicContent(type) {
            if (!storedApiKey) { alert("Please connect a valid API key first."); return; }
            if (!currentDocText) { alert("Please upload a document first."); return; }
            const container = document.getElementById('pdfViewerContainer');
            container.innerHTML = "Processing content via Gemini 2.5 Flash...";
            
            const instruction = type === 'mindmap' 
                ? "Create a 3-node mindmap outline for this document (Hypothesis, Evidence, Conclusion) with brief descriptions. Format as simple HTML." 
                : "Create a 3-slide presentation outline for this document. Format as simple HTML list.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${storedApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Context: ${currentDocText.substring(0, 15000)}... Instruction: ${instruction}` }] }] })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                container.innerHTML = `<div class="p-8 bg-white shadow-md m-4">${data.candidates[0].content.parts[0].text}</div>`;
            } catch (err) {
                container.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded">API Error: ${err.message}</div>`;
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const log = document.getElementById('chatLog');
            const userText = input.value.trim();
            if (!userText) return;
            if (!storedApiKey) { alert("Connect API key first."); return; }
            
            log.innerHTML += `<div class="mb-2"><b>You:</b> ${userText}</div>`;
            input.value = "";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${storedApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Context: ${currentDocText.substring(0, 15000)}... Question: ${userText}` }] }] })
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "No AI response.";
                log.innerHTML += `<div class="mb-2 text-[#b31b1b]"><b>AI:</b> ${aiResponse}</div>`;
            } catch (err) {
                log.innerHTML += `<div class="mb-2 text-red-500"><b>Error:</b> ${err.message}</div>`;
            }
            log.scrollTop = log.scrollHeight;
        }

        document.getElementById('pdfUpload').addEventListener('change', (e) => {
            if (e.target.files[0]) {
                document.getElementById('docList').innerHTML = `<li class="p-2 bg-white border rounded text-xs truncate">${e.target.files[0].name}</li>`;
                renderPDF(e.target.files[0]);
            }
        });
    </script>
</body>
</html>
